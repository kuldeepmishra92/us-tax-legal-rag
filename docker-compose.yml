services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: legalrag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles: ["phase2", "all"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: legalrag-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    profiles: ["phase3", "all"]

  neo4j:
    image: neo4j:5.26-community
    container_name: legalrag-neo4j
    environment:
      - NEO4J_AUTH=neo4j/changeme_local_dev
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt
    volumes:
      - neo4j_data:/data
    profiles: ["phase7", "all"]

volumes:
  qdrant_data:
  es_data:
  neo4j_data:

# Usage:
#   docker compose --profile phase2 up -d      # just Qdrant (Phase 2)
#   docker compose --profile phase3 up -d      # just Elasticsearch (Phase 3)
#   docker compose --profile phase7 up -d      # just Neo4j (Phase 7)
#   docker compose --profile all up -d         # everything
